<!DOCTYPE html>
<html>
<head>
<title>Fitiavako 💖</title>

<style>
body {
  background-color: pink;
  text-align: center;
  font-family: Arial;
  overflow: hidden;
}

h1 {
  color: red;
  animation: pulse 1s infinite;
}

@keyframes pulse {
  0% {opacity: 1;}
  50% {opacity: 0.5;}
  100% {opacity: 1;}
}

img {
  width: 200px;
  border-radius: 20px;
  animation: zoom 2s infinite alternate;
}

@keyframes zoom {
  0% {transform: scale(1);}
  100% {transform: scale(1.1);}
}

/* bouton */
button {
  padding: 10px 20px;
  font-size: 18px;
  background-color: red;
  color: white;
  border: none;
  border-radius: 10px;
  margin-top: 20px;
}

/* coeur mihetsika */
.heart {
  position: fixed;
  top: -10px;
  color: red;
  animation: fall 5s linear infinite;
}

@keyframes fall {
  0% {top: -10px;}
  100% {top: 100%;}
}
</style>

</head>

<body>

<h1>❤️ Ianao no fitiavako ❤️</h1>

<p>Tiako ianao, tsy misy toa anao eto an-tany 💕</p>

<img src="https://images.unsplash.com/photo-1518199266791-5375a83190b7">

<p>Alain ❤️ (anaranao) + (anarany)</p>

<button onclick="showMessage()">Clique-moi 💌</button>

<audio autoplay loop>
  <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3">
</audio>

<script>
function showMessage() {
  alert("💖 Tiako be ianao! Tsy hisaraka aminao aho 💖");
}

// mamorona coeur
setInterval(function() {
  var heart = document.createElement("div");
  heart.className = "heart";
  heart.innerHTML = "❤️";
  heart.style.left = Math.random() * 100 + "%";
  document.body.appendChild(heart);

  setTimeout(() => {
    heart.remove();
  }, 5000);

}, 500);
</script>

</body>
</html>
